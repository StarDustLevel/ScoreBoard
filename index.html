<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="scoreboard">
        <div class="team">
            <h3 id="home-title">HOME</h3>
            <div class="score-box" id="home-score-box">
                <span id="home-score">0</span>
            </div>
            <div class="buttons">
                <button onclick="addPoints('home', 1)">+1</button>
                <button onclick="addPoints('home', 2)">+2</button>
                <button onclick="addPoints('home', 3)">+3</button>
            </div>
        </div>
        <div>
            <div class="team">
                <h3 id="guest-title">GUEST</h3>
                <div class="score-box" id="guest-score-box">
                    <span id="guest-score">0</span>
                </div>
                <div class="buttons">
                    <button onclick="addPoints('guest', 1)">+1</button>
                    <button onclick="addPoints('guest', 2)">+2</button>
                    <button onclick="addPoints('guest', 3)">+3</button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
</body>

</html>
